name: Prod Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy."
        required: true
        type: string

concurrency:
  group: prod-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_NAME: applyhub
  YQ_VERSION: v4.44.3

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "Release tag is required"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $TAG"

      - name: Verify release tag
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          git rev-parse "$TAG" >/dev/null 2>&1 || {
            echo "Tag '$TAG' does not exist"
            exit 1
          }

      - name: Verify tag is on main
        run: |
          TAG="${{ steps.resolve.outputs.tag }}"
          git fetch origin main
          git merge-base --is-ancestor "$TAG" origin/main || {
            echo "Tag '$TAG' is not contained in origin/main"
            exit 1
          }

  detect-changes:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: applyhub7/applyhub-manifests
          token: ${{ secrets._GITHUB_TOKEN }}
          path: manifests
          ref: main

      - name: Install yq
        run: |
          wget "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Detect changed services
        id: detect
        run: |
          NEW_TAG="${{ needs.prepare.outputs.tag }}"
          SERVICES_JSON="[]"

          for service in application-service auth-service job-service api-gateway frontend; do
            MANIFEST="./manifests/apps-manifests/env/prod/$service.yaml"

            case "$service" in
              frontend)
                SERVICE_PATH="frontend"
                ;;
              *)
                SERVICE_PATH="backend/$service"
                ;;
            esac

            CURRENT_TAG=""
            if [ -f "$MANIFEST" ]; then
              CURRENT_TAG="$(yq -r '.release.sourceTag // .image.tag // ""' "$MANIFEST")"
            fi

            if [ -z "$CURRENT_TAG" ]; then
              CHANGED=true
              echo "$service has no current prod source tag; marking as changed"
            elif ! git rev-parse "$CURRENT_TAG" >/dev/null 2>&1; then
              CHANGED=true
              echo "$service current prod tag '$CURRENT_TAG' is not in this repo; marking as changed"
            elif git diff --quiet "$CURRENT_TAG" "$NEW_TAG" -- "$SERVICE_PATH"; then
              CHANGED=false
              echo "$service unchanged from $CURRENT_TAG to $NEW_TAG"
            else
              CHANGED=true
              echo "$service changed from $CURRENT_TAG to $NEW_TAG"
            fi

            if [ "$CHANGED" = true ]; then
              SERVICES_JSON="$(echo "$SERVICES_JSON" | jq -c --arg service "$service" '. + [$service]')"
            fi
          done

          echo "services=$SERVICES_JSON" >> "$GITHUB_OUTPUT"
          echo "Changed services: $SERVICES_JSON"

  build-and-push:
    needs:
      - prepare
      - detect-changes
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'frontend' && './frontend/' || format('./backend/{0}/', matrix.service) }}
          file: ${{ matrix.service == 'frontend' && './frontend/Dockerfile' || format('./backend/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}:${{ needs.prepare.outputs.tag }}
            ${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs:
      - prepare
      - detect-changes
      - build-and-push
    if: needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != ''
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: applyhub7/applyhub-manifests
          token: ${{ secrets._GITHUB_TOKEN }}
          path: manifests
          ref: main

      - name: Install yq
        run: |
          wget "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Update prod manifests
        run: |
          cd manifests
          TAG="${{ needs.prepare.outputs.tag }}"

          for service in $(echo '${{ needs.detect-changes.outputs.services }}' | jq -r '.[]' 2>/dev/null || echo ""); do
            if [ -z "$service" ]; then continue; fi

            FILE="./apps-manifests/env/prod/$service.yaml"
            if [ -f "$FILE" ]; then
              yq -i e ".image.tag = \"$TAG\"" "$FILE"
              yq -i e ".release.sourceTag = \"$TAG\"" "$FILE"
              git add "$FILE"
              echo "Updated prod manifest for $service with tag $TAG"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --staged --quiet; then
            echo "No actual changes"
          else
            git commit -m "ci: release prod images to ${TAG}"
            git push origin main
            echo "Successfully updated prod manifests"
          fi

name: CI dev pipeline

on:
  pull_request:
    branches:
      - dev-ci
    paths:
      - 'backend/**'
      - 'frontend/**'

env:
  PROJECT_NAME: applyhub

permissions: 
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            application-service: 'backend/application-service/**'
            auth-service: 'backend/auth-service/**'
            job-service: 'backend/job-service/**'
            api-gateway: 'backend/api-gateway/**'
            frontend: 'frontend/**'  
            
  ci:        
    needs: detect-changes  
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}  
    runs-on: ubuntu-latest
    strategy:
      matrix: 
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}  
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 1. Sửa lỗi lấy SHA trên môi trường Pull Request (Lấy từ nhánh head đang đòi merge)
      - name: Setup dev tag
        run: |
          SHORT_SHA=$(git rev-parse --short=7 ${{ github.event.pull_request.head.sha }})
          echo "DEV_TAG=dev-$SHORT_SHA" >> $GITHUB_ENV

      # 2. Setup Docker Buildx để kích hoạt các tính năng tối ưu layer nâng cao
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Đăng nhập vào Docker Hub công ty
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      # =========================================================
      # PHÂN LUỒNG SETUP TOOLS THEO TỪNG THÀNH PHẦN (MATRIX CONDITION)
      # =========================================================

      # CHỈ cài Python 3.11 nếu service đang chạy trong matrix hiện tại là 'job-service'
      - name: Setup python 3.11 (Chỉ dành cho Job Service)
        if: matrix.service == 'job-service'
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # CHỈ cài Node 18 cho 4 thành phần còn lại (không phải job-service)
      - name: Setup node 18 (Dành cho 4 dịch vụ còn lại)
        if: matrix.service != 'job-service'
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # Tự động cache npm dựa theo cấu trúc Monorepo để tăng tốc độ cài thư viện
          cache: 'npm'
          cache-dependency-path: |
            ${{ matrix.service == 'frontend' && './frontend/package-lock.json' || format('./backend/{0}/package-lock.json', matrix.service) }}

      # =========================================================
      # KIỂM THỬ VÀ KIỂM TRA CHẤT LƯỢNG CODE (TESTING LOGIC)
      # =========================================================

      # Build thử và test nhanh Frontend bằng Curl trước khi đóng gói
      - name: Install & Build frontend
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
          npm run preview &
          sleep 5
          curl http://127.0.0.1:4173

      # =========================================================
      # ĐÓNG GÓI VÀ PUSH IMAGE (DOCKER BUILD & PUSH)
      # =========================================================

      # Tự động nhận diện cấu trúc thư mục nhờ toán tử điều kiện của GitHub Actions
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'frontend' && './frontend/' || format('./backend/{0}/', matrix.service) }}
          file: ${{ matrix.service == 'frontend' && './frontend/Dockerfile' || format('./backend/{0}/Dockerfile', matrix.service) }}
          push: true
          # Đặt tên Tag theo dạng: username/applyhub-frontend:dev-a1b2c3d (Chuẩn Docker Hub)
          tags: ${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}:${{ env.DEV_TAG }}
          # Kích hoạt bộ nhớ đệm GitHub Actions giúp giảm thời gian build Docker tới 80% ở các lần sau
          cache-from: type=gha
          cache-to: type=gha,mode=max
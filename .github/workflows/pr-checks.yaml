name: PR Checks

on:
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      auth-service: ${{ steps.filter.outputs.auth-service }}
      application-service: ${{ steps.filter.outputs.application-service }}
      job-service: ${{ steps.filter.outputs.job-service }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            api-gateway:
              - 'backend/api-gateway/**'
            auth-service:
              - 'backend/auth-service/**'
            application-service:
              - 'backend/application-service/**'
            job-service:
              - 'backend/job-service/**'

  frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    uses: ./.github/workflows/check-node-app.yaml
    with:
      working-directory: frontend
      run-build: true

  api-gateway:
    needs: detect-changes
    if: needs.detect-changes.outputs.api-gateway == 'true'
    uses: ./.github/workflows/check-node-app.yaml
    with:
      working-directory: backend/api-gateway

  auth-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-service == 'true'
    uses: ./.github/workflows/check-node-app.yaml
    with:
      working-directory: backend/auth-service

  application-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.application-service == 'true'
    uses: ./.github/workflows/check-node-app.yaml
    with:
      working-directory: backend/application-service

  job-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.job-service == 'true'
    uses: ./.github/workflows/check-python-service.yaml
    with:
      working-directory: backend/job-service
      python-version: "3.11"

  pr-checks-gate:
    needs:
      - frontend
      - api-gateway
      - auth-service
      - application-service
      - job-service
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report result
        run: |
          results='${{ toJson(needs) }}'
          echo "$results"

          if echo "$results" | jq -e '.[] | select(.result == "failure" or .result == "cancelled")' >/dev/null; then
            echo "FAILED - one or more services failed checks"
            exit 1
          fi

          echo "PASSED - all required service checks completed successfully"

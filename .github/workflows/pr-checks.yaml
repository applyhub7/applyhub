name: PR Checks

on:
  pull_request:
    branches: [dev-ci]
    types: [opened, synchronize, reopened]
    paths: ['backend/**', 'frontend/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
     - uses: actions/checkout@v4
     - uses: dorny/paths-filter@v3
       id: filter
       with:
         filters: |
           application-service: 'backend/application-service/**'
           auth-service: 'backend/auth-service/**'
           job-service: 'backend/job-service/**'
           api-gateway: 'backend/api-gateway/**'
           frontend: 'frontend/**'

  build-check:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node.js 20
        if: |
          matrix.service == 'frontend' ||
          matrix.service == 'api-gateway' ||
          matrix.service == 'auth-service' ||
          matrix.service == 'application-service'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service == 'frontend' && './frontend/package-lock.json' || format('./backend/{0}/package-lock.json', matrix.service) }}
 
      - name: Frontend - install & build
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
 
      - name: Backend Node - install
        if: contains(fromJson('["api-gateway","auth-service","application-service"]'), matrix.service)
        working-directory: ./backend/${{ matrix.service }}
        run: npm ci
 
      - name: Setup Python
        if: matrix.service == 'job-service'
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'
 
      - name: Backend Python - install & compile check
        if: matrix.service == 'job-service'
        working-directory: ./backend/job-service
        run: |
          pip install -r requirements.txt
          python -m compileall .

  build-check-summary:
    needs: build-check
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check matrix result
        run: |
            if [ "${{ needs.build-check.result }}" != "success" ]; then
            echo "build-check failed"
            exit 1
            fi
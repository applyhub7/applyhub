name: Promote to Environment

env:
    PROJECT_NAME: applyhub

on:
  workflow_dispatch:
    inputs:
      source_env:
        description: 'Source environment'
        required: true
        type: choice
        options: [dev, dev-ci]
      target_env:
        description: 'Target environment'
        required: true
        type: choice
        options: [main, main-ci]
      version:
        description: 'Version'
        required: true

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Application Repo
        uses: actions/checkout@v4
        with:
          path: app-source

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: applyhub7/applyhub-manifests
          token: ${{ secrets._GITHUB_TOKEN }}
          path: manifests

      - name: Install regctl
        run: |
          curl -L https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 > /usr/local/bin/regctl
          chmod +x /usr/local/bin/regctl

      - name: Get Latest SHA from Application Repo
        id: app-sha
        run: |
          cd app-source
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "APP_SHA=$SHORT_SHA" >> $GITHUB_ENV
          echo "Application SHA: $SHORT_SHA"

      - name: Login to DockerHub for regctl
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Promote Changed Services
        run: |
          VERSION="${{ inputs.version }}"
          NEW_TAG="v${VERSION}"

          cd manifests

          for service in api-gateway frontend application-service job-service auth-service; do
            FILENAME="$service-deploy.yml"

            SRC_FILE="apps-manifests/$service/dev/$FILENAME"
            DST_FILE="apps-manifests/$service/prod/$FILENAME"

            if [ -f "$SRC_FILE" ]; then
              CURRENT_TAG=$(yq e '.spec.template.spec.containers[0].image' "$SRC_FILE" | cut -d':' -f2)

              # So sánh với SHA từ Application Repo
              if [[ "$CURRENT_TAG" == *"$APP_SHA"* ]]; then
              

                IMAGE="${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-${service}"
                

                echo "→ $service changed (SHA: $APP_SHA) → Re-tagging to $NEW_TAG"

                regctl image copy $IMAGE:$CURRENT_TAG $IMAGE:$NEW_TAG

                yq -i e ".spec.template.spec.containers[0].image = \"$IMAGE:$NEW_TAG\"" "$DST_FILE"
                git add "$DST_FILE"

                echo "✓ Promoted $service"

              else
                echo "→ $service no change"
              fi
            fi
          done


          git config user.name "github-actions[bot]"
          git config user.email "41898282+noseyug[bot]@users.noreply.github.com"

          # if [ "$UPDATED" = true ]; then
            if git diff --staged --quiet; then
              echo "No actual changes in manifests"
            else
              git commit -m "ci: update images to $NEW_TAG"
              git push origin main
              echo "Successfully updated manifests"
            fi
          # else
          #     echo "No services changed, skipping update"
          # fi
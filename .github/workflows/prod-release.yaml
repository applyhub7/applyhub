name: Production Release

# Chạy tự động khi 1 GitHub Release được PUBLISH,
# hoặc chạy tay và tự chọn tag muốn release/re-run/rollback
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag cần release (vd: v1.0.0). Để trống sẽ dùng tag mới nhất."
        required: false
        type: string

concurrency:
  group: prod-release
  cancel-in-progress: false   # KHÔNG cancel giữa chừng khi đang release production

permissions:
  contents: read

env:
  PROJECT_NAME: applyhub
  YQ_VERSION: v4.44.3

jobs:
  # ------------------------------------------------------------------
  # 0. Chỉ cho phép release từ branch main + xác định tag cần chạy
  # ------------------------------------------------------------------
  prepare:
    # Chặn chạy nếu:
    # - release được publish nhưng KHÔNG phải từ branch main
    # - workflow_dispatch được chạy tay nhưng KHÔNG phải trên branch main
    if: |
      (github.event_name == 'release' && github.event.release.target_commitish == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: production
    outputs:
      tag: ${{ steps.tag.outputs.resolved }}
    steps:
      - name: Resolve tag cần release
        id: tag
        run: |
          INPUT_TAG="${{ inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            RESOLVED_TAG="$INPUT_TAG"
          else
            RESOLVED_TAG="${GITHUB_REF_NAME}"
          fi
          echo "resolved=$RESOLVED_TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout đúng tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.resolved }}
          fetch-depth: 0

      - name: Verify tag tồn tại
        run: |
          git rev-parse "${{ steps.tag.outputs.resolved }}" >/dev/null 2>&1 || {
            echo "::error::Tag '${{ steps.tag.outputs.resolved }}' không tồn tại trong repo"
            exit 1
          }

      - name: Show release info
        run: |
          echo "Releasing tag: ${{ steps.tag.outputs.resolved }}"
          echo "Release notes:"
          echo "${{ github.event.release.body || '(chạy tay - không có release notes)' }}"

  # ------------------------------------------------------------------
  # 1. Rebuild & test lại toàn bộ service
  #    (production release build TOÀN BỘ, không chỉ service thay đổi -
  #    vì tag là 1 snapshot cố định của cả repo, cần đảm bảo mọi service
  #    đều được build/verify lại đồng bộ)
  # ------------------------------------------------------------------
  build-check:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        service: [application-service, auth-service, job-service, api-gateway, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js 20
        if: |
          matrix.service == 'frontend' ||
          matrix.service == 'api-gateway' ||
          matrix.service == 'auth-service' ||
          matrix.service == 'application-service'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.service == 'frontend' && './frontend/package-lock.json' || format('./backend/{0}/package-lock.json', matrix.service) }}

      - name: Frontend - install & build
        if: matrix.service == 'frontend'
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Backend Node - install
        if: contains(fromJson('["api-gateway","auth-service","application-service"]'), matrix.service)
        working-directory: ./backend/${{ matrix.service }}
        run: npm ci

      - name: Setup Python
        if: matrix.service == 'job-service'
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
          cache: 'pip'

      - name: Backend Python - install & compile check
        if: matrix.service == 'job-service'
        working-directory: ./backend/job-service
        run: |
          pip install -r requirements.txt
          python -m compileall .

  # ------------------------------------------------------------------
  # 2. Build & push Docker image, tag theo đúng release tag (không dùng SHA)
  # ------------------------------------------------------------------
  build-and-push:
    needs: [prepare, build-check]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        service: [application-service, auth-service, job-service, api-gateway, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service == 'frontend' && './frontend/' || format('./backend/{0}/', matrix.service) }}
          file: ${{ matrix.service == 'frontend' && './frontend/Dockerfile' || format('./backend/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}:${{ needs.prepare.outputs.tag }}
            ${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # 3. Update manifest cho môi trường PROD - ArgoCD sẽ tự sync sau đó
  # ------------------------------------------------------------------
  update-manifests:
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Checkout Manifests Repo
        uses: actions/checkout@v4
        with:
          repository: applyhub7/applyhub-manifests
          token: ${{ secrets._GITHUB_TOKEN }}
          path: manifests
          ref: main

      - name: Install yq
        run: |
          wget "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Update Prod Manifests
        run: |
          cd manifests
          TAG="${{ needs.prepare.outputs.tag }}"

          for service in application-service auth-service job-service api-gateway frontend; do
            FILE="./apps-manifests/env/prod/$service.yaml"
            if [ -f "$FILE" ]; then
              yq -i e ".image.tag = \"$TAG\"" "$FILE"
              git add "$FILE"
              echo "✓ Updated prod manifest for $service with tag $TAG"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "41898282+noseyug[bot]@users.noreply.github.com"
          if git diff --staged --quiet; then
            echo "No actual changes"
          else
            git commit -m "ci: release prod images to ${TAG}"
            git push origin main
            echo "Successfully updated prod manifests"
          fi
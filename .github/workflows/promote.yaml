name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version Production (ví dụ: 1.0.0, 1.2.3)'
        required: true
      description:
        description: 'Ghi chú release (tùy chọn)'
        required: false
        default: 'Production Release'

permissions:
  actions: read
  contents: read
  
env:
  PROJECT_NAME: applyhub

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: production   # Nên tạo environment này để thêm approval

    steps:
      - name: Tìm run mới nhất của CI Dev
        id: find_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list --workflow="CI Dev" --branch=dev-ci \
            --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::error::Không tìm thấy run thành công nào của CI Dev trên dev-ci"
            exit 1
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download artifact từ run Deploy Dev
        uses: actions/download-artifact@v4
        with:
          name: promotion-data
          path: ./promotion-data
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      
      - name: Đọc sha.txt ra output
        id: data
        run: echo "sha=$(cat ./promotion-data/sha.txt)" >> "$GITHUB_OUTPUT"
          

      - name: Đọc changed_services.json ra output
        id: services
        run: echo "services=$(cat ./promotion-data/changed_services.json)" >> "$GITHUB_OUTPUT"
          

      - name: Checkout Manifests Repo
        uses: actions/checkout@v4
        with:
          repository: applyhub7/applyhub-manifests
          token: ${{ secrets._GITHUB_TOKEN }}
          path: manifests
          ref: main

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Install Tools
        run: |
          # regctl
          curl -L https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 -o /usr/local/bin/regctl
          chmod +x /usr/local/bin/regctl
          
          # yq
          wget https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Promote Only Changed Services
        env:
          PROD_VERSION: v${{ inputs.version }}
          CURRENT_TAG: ${{ steps.data.outputs.sha }}
        run: |
          cd manifests
          UPDATED=false
          PROMOTED_SERVICES=""

          echo "🚀 Starting promotion to $PROD_VERSION"
          echo "Current dev-ci SHA: $CURRENT_TAG"
          for service in $(echo '${{ steps.output.outputs.services }}' | jq -r '.[]' 2>/dev/null || echo ""); do
          
          dev_file="apps-manifests/env/dev/$service.yaml"

            if [ ! -f "$dev_file" ]; then continue; fi

            service=$(basename "$dev_file" .yaml)
            prod_file="apps-manifests/env/prod/${service}.yaml"

            if [ -f "$prod_file" ]; then
              DEV_TAG=$(yq e '.image.tag' "$dev_file" | tr -d ' \n')

              # Chỉ promote service đang dùng SHA mới nhất từ dev-ci
              if [[ "$DEV_TAG" == *"$CURRENT_TAG"* ]]; then
                IMAGE_NAME="${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-${service}"

                echo "→ Promoting changed service: $service ($DEV_TAG → $PROD_VERSION)"

                if regctl image copy "$IMAGE_NAME:$DEV_TAG" "$IMAGE_NAME:$PROD_VERSION" --force-tag; then
                  yq -i e ".image.tag = \"$PROD_VERSION\"" "$prod_file"
                  git add "$prod_file"
                  UPDATED=true
                  PROMOTED_SERVICES="$PROMOTED_SERVICES $service"
                  echo "✓ Promoted $service"
                else
                  echo "❌ Failed to copy image for $service"
                fi
              else
                echo "→ $service: No change"
              fi
            fi
          done

          if [ "$UPDATED" = true ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+noseyug[bot]@users.noreply.github.com"
            
            git commit -m "release: v${{ inputs.version }} [${PROMOTED_SERVICES}]"
            git pull origin main --rebase
            git push origin main

            echo "✅ Promotion to v${{ inputs.version }} completed successfully!"
            echo "Promoted services: ${PROMOTED_SERVICES}"
          else
            echo "⚠️ No services changed or using latest SHA."
            echo "Please ensure CI Dev has run successfully on dev-ci branch."
          fi
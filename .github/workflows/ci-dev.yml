  name: CI Dev

  on:
    pull_request:
      branches: [ dev-ci, main ]
      types: [opened, synchronize, reopened]
      paths: [backend/**', 'frontend/**']
      
    push:
      branches: [ dev-ci]
      paths: [backend/**', 'frontend/**'] 

    workflow_dispatch:

  concurrency:
    group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
    cancel-in-progress: true 
      
  env:
    PROJECT_NAME: applyhub

  permissions: 
    contents: read
    pull-requests: read

  jobs:
    detect-changes:
      runs-on: ubuntu-latest
      outputs:
        services: ${{ steps.filter.outputs.changes }}
      steps:
        - uses: actions/checkout@v4
        - uses: dorny/paths-filter@v3
          id: filter
          with:
            filters: |
              application-service: 'backend/application-service/**'
              auth-service: 'backend/auth-service/**'
              job-service: 'backend/job-service/**'
              api-gateway: 'backend/api-gateway/**'
              frontend: 'frontend/**'  
    
    test:
      needs: detect-changes  
      if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}  
      runs-on: ubuntu-latest
      strategy:
        matrix: 
          service: ${{ fromJson(needs.detect-changes.outputs.services) }}  
      steps:
        - uses: actions/checkout@v4
            
        - name: Setup Python 3.11
          uses: actions/setup-python@v5
          with:
            python-version: 3.11
        - name: Setup Environment (Node.js 18)
          if: |
            matrix.service == 'frontend' ||
            matrix.service == 'api-gateway' ||
            matrix.service == 'auth-service' ||
            matrix.service == 'application-service'            
          uses: actions/setup-node@v4
          with:
            node-version: 18
            cache: npm
            cache-dependency-path: ${{ matrix.service == 'frontend' && './frontend/package-lock.json' || 
              format('./backend/{0}/package-lock.json', matrix.service) }}

        - name: Validate & Test Frontend
          if: matrix.service == 'frontend'
          working-directory: ./frontend
          run: |
            npm ci
            #npm run lint
            #npm run test:unit

        - name: Validate & Test Node Backend
          if: |
            matrix.service == 'api-gateway' ||
            matrix.service == 'auth-service' ||
            matrix.service == 'application-service'
          working-directory: ./backend/${{ matrix.service }}
          run: |
            npm ci
            #npm run test         
            
        - name: Setup Environment (Python 3.11)
          if: |
            matrix.service == 'job-service'
          uses: actions/setup-python@v5
          with:
            python-version: 3.11
            cache: pip
            cache-dependency-path: ./backend/job-service/requirements.txt
            
        - name: Validate & Test Python Backend
          if: matrix.service == 'job-service'
          working-directory: ./backend/job-service
          run: |
            pip install -r requirements.txt
            #pytest tests/

    build-and-push:
      needs: [detect-changes, test]
      if: github.ref == 'refs/heads/dev-ci' && github.event_name == 'push'
      runs-on: ubuntu-latest
      strategy:
        matrix: 
          service: ${{ fromJson(needs.detect-changes.outputs.services) }}
      steps:
        - uses: actions/checkout@v4

        - name: Setup Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to DockerHub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASS }}

        - name: Generate Docker Image Tag
          id: tag
          run: |
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            echo "TAG=build-${{ github.run_number }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          
        - name: Build and Push Docker Image
          uses: docker/build-push-action@v6
          with:
            context: ${{ matrix.service == 'frontend' && './frontend/' || format('./backend/{0}/', matrix.service) }}
            file: ${{ matrix.service == 'frontend' && './frontend/Dockerfile' || format('./backend/{0}/Dockerfile', matrix.service) }}
            push: true
            tags: ${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-${{ matrix.service }}:${{ steps.tag.outputs.TAG }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

        - name: Checkout Manifests Repo
          uses: actions/checkout@v4
          with:
            repository: https://github.com/applyhub7/applyhub-manifests
            token: ${{ secrets._GITHUB_TOKEN }}
            path: manifests
            ref: dev
        
        - name: Install yq
          run: sudo snap install yq

            
        - name: Update Manifests 
          run: |
            cd  manifests

            UPDATED=false
            TAG="${{ steps.tag.outputs.TAG }}"

            for service in $(echo '${{ needs.detect-changes.outputs.services }}' | jq -r '.[]' 2>/dev/null || echo ""); do
              if [ -z "$service" ]; then continue; fi

              echo "Updating manifest for $service"
              UPDATED=true

            if [[ "$service" == "frontend" ]]; then
              FILE="./frontend/frontend-deploy.yaml"
            else
              FILE="./backend/$service/$service-deploy.yaml"
            fi

            yq e -i ".spec.template.spec.containers[0].image = \"${{ secrets.DOCKER_USER }}/${{ env.PROJECT_NAME }}-$service:${TAG}\"" "$FILE"
            
            git add "$FILE"
            done  


            git config user.name "github-actions[bot]"
            git config user.email "actions@github.com" 

            done

            # Chỉ commit nếu có thay đổi
            if [ "$UPDATED" = true ]; then
              if git diff --staged --quiet; then
                echo "No actual changes in manifests"
              else
                git commit -m "ci: update images to [${TAG}]"
                git push origin dev
                echo "Successfully updated manifests"
              fi
            else
              echo "No services changed, skipping update"
            fi


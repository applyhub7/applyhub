name: CI dev pipleine

on:
  pull_request:
    branches:
      - dev-ci
    paths:
      - 'backend/**'
      - 'frontend/**'

# jobs:
#     detect-changes:
#         runs-on: ubuntu-latest
#         outputs:
#           services: ${{ steps.filter.outputs.changes }}
#         steps:
#         - uses: actions/checkout@v4

#         - uses: dorny/paths-filter@v3
#           id: filter
#           with:
#             filters: | 
#               application-service: 'backend/application-service/**'
#               auth-service: 'backend/auth-service/**'
#               job-service: 'backend/job-service/**'
#               api-gateway: 'backend/api-gateway/**'
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4

      - run: ls

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            application-service: 'backend/application-service/**'
            auth-service: 'backend/auth-service/**'
            job-service: 'backend/job-service/**'
            api-gateway: 'backend/api-gateway/**'      
  ci:        
        needs: detect-changes  
        if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}  
        runs-on: ubuntu-latest
        strategy:
          matrix: ${{ fromJson(needs.detect-changes.outputs.services) }}  
        steps:
        - name: Checkout source code
          uses: actions/checkout@v4

        - name: Setup python 3.11
          uses: actions/setup-python@v5
          with:
            python-version: 3.11
        - name: Setup node 18    
          uses: actions/setup-node@v4
          with:
            node-version: 18
        - name: Install & Build frontend
          working-directory: ./frontend
          run: |
            npm ci
            npm run build
            npm run preview &
            sleep 5
            curl http://127.0.0.1:4173

        - name: Build frontend image
          run: |
            SHORT_SHA=$(git rev-parse --short=7 ${{ github.event.pull_request.head.sha }})
            docker build -t noseyug/applyhub/${{matrix}}:$SHORT_SHA ./${{matrix}}/
            #docker build -t noseyug/applyhub/frontend:$SHORT_SHA ./frontend/
          

        # - name: Build frontend image   
        #   run:  docker build -t noseyug/applyhub/frontend:$SHORT_SHA .frontend




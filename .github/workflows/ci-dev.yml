name: CI dev pipleine

on:
  pull_request:
    branches: ["dev-ci"]

jobs:
    test:
        runs-on: ubuntu-latest        
        steps:
        - name: Checkout source code
          uses: actions/checkout@v4
        - name: List files
          run: ls -la
        - name: Build Docker image
          run: docker build -t noseyug/applyhub/application-service:${{ github.sha }} /backend/application-service
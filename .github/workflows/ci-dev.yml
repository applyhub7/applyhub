name: CI dev pipleine

on:
  pull_request:
    branches:
      - dev-ci
    paths:
      - 'backend/**'
      - 'frontend/**'

env:
  SHORT_SHA: $(git rev-parse --short=7 ${{ github.event.pull_request.head.sha }})
  BASE_IMAGE: noseyug/applyhub/

permissions: 
  contents: read
  pull-requests: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            application-service: 'backend/application-service/**'
            auth-service: 'backend/auth-service/**'
            job-service: 'backend/job-service/**'
            api-gateway: 'backend/api-gateway/**'
            frontend: 'frontend/**'  
            
  ci:        
        needs: detect-changes  
        if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}  
        runs-on: ubuntu-latest
        strategy:
          matrix: 
            service: ${{ fromJson(needs.detect-changes.outputs.services) }}  
        steps:
        - name: Checkout source code
          uses: actions/checkout@v4
#Setup tools          
        - name: Setup python 3.11
          uses: actions/setup-python@v5
          with:
            python-version: 3.11
        - name: Setup node 18    
          uses: actions/setup-node@v4
          with:
            node-version: 18

        - name: Setup dev tag
          run: |
            SHORT_SHA=$(git rev-parse --short=7 HEAD)
            echo "DEV_TAG=dev-$SHORT_SHA" >> $GITHUB_ENV
#Frontend            
        - name: Install & Build frontend
          if: matrix.service == 'frontend'
          working-directory: ./frontend
          run: |
            npm ci
            npm run build
            npm run preview &
            sleep 5
            curl http://127.0.0.1:4173

            docker build -t ${BASE_IMAGE}frontend:${DEV_TAG} .
#Backend
        - name: Build service images
          if: matrix.service != 'frontend'
          run: |
            docker build -t ${BASE_IMAGE}${{matrix.service}}:${DEV_TAG} ./backend/${{matrix.service}}/


          

        
name: CI dev pipleine

on:
  pull_request:
    branches:
      - dev-ci

jobs:
    ci:
        runs-on: ubuntu-latest        
        steps:
        - name: Checkout source code
          uses: actions/checkout@v4

        - name: Setup python 3.11
          uses: actions/setup-python@v5
          with:
            python-version: 3.11
        - name: Setup node 18    
          uses: actions/setup-node@v4
          with:
            node-version: 18
        - name: Install & Build frontend
          working-directory: ./frontend
          run: |
            npm ci
            npm run build
            npm run preview &
            sleep 5
            curl http://127.0.0.1:4173

        - name: Build frontend image
          run: |
            SHORT_SHA=$(git rev-parse --short=7 ${{ github.event.pull_request.head.sha }})
            docker build -t noseyug/applyhub/frontend:$SHORT_SHA .frontend
          


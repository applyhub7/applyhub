name: CD Dev

on:
  workflow_run:
    workflows: ["CI Dev"] 
    types:
      - completed

jobs:
  deploy-to-dev:
    # Chỉ chạy nếu file CI kết thúc với trạng thái THÀNH CÔNG
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    steps:
      # Bước 1: Lấy thông tin SHA của commit gốc từ file CI để đồng bộ tag
      - name: Get Commit SHA from CI
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "TAG=build-${{ github.event.workflow_run.run_number }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          
          # Lấy danh sách các service đã được thay đổi từ commit đó (Để CD biết cần update cái nào)
          # Trong thực tế Intern, bạn có thể update toàn bộ hoặc update dựa trên log commit.
          # Ở đây chúng ta sẽ giả lập việc check xem file nào đổi, hoặc cập nhật tag cho toàn bộ các service được build.

      # Bước 2: Checkout GitOps/Manifest Repository bằng PAT (Personal Access Token)
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: 'your-github-username/applyhub-manifests' # Thay bằng repo manifest của bạn/công ty
          token: ${{ secrets.MANIFEST_REPO_PAT }} # Token có quyền ghi (write) vào repo manifest
          path: 'manifest-repo' # Clone vào một thư mục riêng để xử lý

      # Bước 3: Sử dụng công cụ 'yq' để sửa file cấu hình YAML chuẩn xác
      - name: Update Image Tag in Kubernetes Manifests
        run: |
          NEW_TAG="${{ steps.vars.outputs.TAG }}"
          echo "Cập nhật các service lên tag mới: $NEW_TAG"
          
          cd manifest-repo
          
          # Đội DevOps hay tổ chức thư mục manifest dạng: k8s/dev/service-name/deployment.yaml
          # Dưới đây là ví dụ cập nhật động bằng vòng lặp nếu bạn tổ chức thư mục chuẩn chỉnh:
          
          # Giả sử cấu hình file deployment.yaml của bạn có node: spec.template.spec.containers[0].image
          # Chúng ta dùng yq để sửa trực tiếp mà không sợ bị sai lệch cấu hình cấu trúc YAML
          
          # Ví dụ cập nhật cho các service (Trong thực tế bạn có thể tinh chỉnh đoạn này để chỉ cập nhật service vừa build)
          if [ -d "k8s/dev/frontend" ]; then
            yq -i ".spec.template.spec.containers[0].image = \"docker.io/${{ secrets.DOCKER_USER }}/applyhub-frontend:$NEW_TAG\"" k8s/dev/frontend/deployment.yaml
          fi
          
          if [ -d "k8s/dev/job-service" ]; then
            yq -i ".spec.template.spec.containers[0].image = \"docker.io/${{ secrets.DOCKER_USER }}/applyhub-job-service:$NEW_TAG\"" k8s/dev/job-service/deployment.yaml
          fi
          
          # Làm tương tự cho các service khác: auth-service, application-service, api-gateway...

      # Bước 4: Commit thay đổi và Push lên Manifest Repo để kích hoạt GitOps (ArgoCD/Flux)
      - name: Commit and Push to Manifest Repo
        run: |
          cd manifest-repo
          
          # Cấu hình danh tính Git Bot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Kiểm tra xem thực sự có file nào thay đổi tag không, tránh push rỗng gây lỗi pipeline
          if git diff --exit-code; then
            echo "Không có thay đổi nào trong manifest. Bỏ qua bước push."
          else
            git add .
            # Thêm tag [skip ci] để tránh việc Manifest repo tự trigger CI của chính nó (nếu có)
            git commit -m "chore(cd): cập nhật image tag lên $NEW_TAG [skip ci]"
            git push origin main
          fi